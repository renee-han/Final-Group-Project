<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Finder - Find Things to Do</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .hero-section {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-container input {
            flex: 1;
            min-width: 200px;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-container button {
            padding: 15px 35px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .search-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .search-container button:active {
            transform: translateY(0);
        }

        .error-alert {
            background-color: #fee;
            border: 2px solid #f88;
            color: #c33;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .error-alert i {
            font-size: 20px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid #f0f0f0;
        }

        .feature {
            text-align: center;
        }

        .feature-icon {
            font-size: 32px;
            margin-bottom: 8px;
            color: #667eea;
        }

        .feature-text {
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .hero-section {
                padding: 40px 25px;
            }

            h1 {
                font-size: 32px;
            }

            .hero-icon {
                font-size: 60px;
            }

            .features {
                grid-template-columns: 1fr;
            }

            .search-container {
                flex-direction: column;
            }

            .search-container input {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <i class="fas fa-compass hero-icon"></i>
        <h1>Activity Finder</h1>
        <p class="subtitle">Discover fun things to do in any location based on weather and your interests</p>

        {% if error %}
            <div class="error-alert">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ error }}</span>
            </div>
        {% endif %}

        <form action="/recommendations" method="POST" class="search-container">
            <input 
                type="text" 
                name="place" 
                placeholder="Enter a city, neighborhood, or landmark..." 
                required
                autocomplete="off"
            >
            <button type="submit">
                <i class="fas fa-search"></i> Find Activities
            </button>
        </form>

        <div class="features">
            <div class="feature">
                <div class="feature-icon"><i class="fas fa-cloud-sun"></i></div>
                <div class="feature-text">Real-time Weather</div>
            </div>
            <div class="feature">
                <div class="feature-icon"><i class="fas fa-lightbulb"></i></div>
                <div class="feature-text">Smart Suggestions</div>
            </div>
            <div class="feature">
                <div class="feature-icon"><i class="fas fa-globe"></i></div>
                <div class="feature-text">Worldwide Coverage</div>
            </div>
        </div>
    </div>
</body>
</html>
